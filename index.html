<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquadramento do Estudante - FAODO</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <main class="container">
        <h2>Verifique o Enquadramento do Estudante</h2>
        <p id="cursoAtual">Carregando dados do curso...</p>
        
        <div class="upload-historico">
            <label for="inputHistorico"><strong>Opção 1:</strong> Faça o upload do Histórico do Aluno (Excel/CSV):</label>
            <input type="file" id="inputHistorico" accept=".xlsx, .xls, .csv">
        </div>

        <hr>

        <label for="cargaHoraria"><strong>Opção 2:</strong> Ou digite a Carga Horária Obrigatória Cursada manualmente:</label>
        <input type="number" id="cargaHoraria" placeholder="Ex: 1500" min="0">
        <button id="btnCalcular">Calcular Enquadramento</button>

        <p id="resultado"></p>

        <hr>

        <div class="admin-panel">
            <h3>Gerenciar Grade do Curso</h3>
            <button id="btnExportar">Exportar Grade (JSON)</button>
            
            <div class="import-section">
                <label for="inputImportar">Importar Grade (JSON):</label>
                <input type="file" id="inputImportar" accept=".json">
            </div>
        </div>

        <div id="acoesPlano" style="display: none; margin-top: 20px;">
            <hr>
            <h3>Plano de Estudos Gerado</h3>
            <p style="font-size: 14px; color: #555;">Confira a prévia abaixo e escolha como deseja exportar:</p>
            
            <button id="btnCopiarSEI" class="btn-info">Copiar para colar no SEI (<>)</button>
            <button id="btnBaixarWord" class="btn-warning">Baixar documento do Word (.doc)</button>
            
            <div id="previewPlano" style="margin-top: 20px; padding: 30px; border: 1px solid #ccc; background: white; color: black; text-align: left; overflow-x: auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.05);">
                </div>
        </div>
        
    </main>

    <footer>
        Criado por André Augusto Sippel da Silva - 2025
    </footer>

    <script src="main.js"></script>
    <script src="plano_estudos.js"></script>
</body>
</html>
